<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">Customer Management</h1>
    <button
      (click)="isAdding.set(!isAdding())"
      class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700"
    >
      {{ isAdding() ? 'Cancel' : 'Add New Customer' }}
    </button>
  </div>

  <!-- Add Customer Form -->
  <div *ngIf="isAdding()" class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-600">
    <h3 class="text-lg font-bold mb-4">Register New Customer</h3>
    <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Full Name *</label>
        <input type="text" formControlName="name" class="mt-1 block w-full border rounded-md px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Phone Number *</label>
        <input type="text" formControlName="phone" class="mt-1 block w-full border rounded-md px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email (Optional)</label>
        <input type="email" formControlName="email" class="mt-1 block w-full border rounded-md px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Address</label>
        <input type="text" formControlName="address" class="mt-1 block w-full border rounded-md px-3 py-2" />
      </div>
      <div class="flex items-center space-x-2 mt-4 md:col-span-2">
        <input type="checkbox" formControlName="is_business" id="is_business" class="h-4 w-4 text-blue-600" />
        <label for="is_business" class="text-sm text-gray-700">This is a business/corporate customer</label>
      </div>
      <div class="md:col-span-2 pt-4">
        <button
          type="submit"
          [disabled]="customerForm.invalid"
          class="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 disabled:opacity-50"
        >
          Save Customer
        </button>
      </div>
    </form>
  </div>

  <!-- Customers List -->
  <div class="bg-white shadow overflow-hidden sm:rounded-md">
    <div *ngIf="isLoading()" class="p-8 text-center">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
    </div>
    
    <ul *ngIf="!isLoading()" class="divide-y divide-gray-200">
      <li *ngFor="let customer of customers()" class="p-4 hover:bg-gray-50">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm font-bold text-blue-600 truncate">{{ customer.name }}</p>
            <p class="text-xs text-gray-500">{{ customer.phone }}</p>
          </div>
          <div class="text-right">
            <span *ngIf="customer.is_business" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-purple-100 text-purple-800">
              Business
            </span>
            <span *ngIf="!customer.is_business" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">
              Individual
            </span>
            <p class="text-xs text-gray-400 mt-1">{{ customer.email || 'No email' }}</p>
          </div>
        </div>
      </li>
    </ul>
    
    <div *ngIf="!isLoading() && customers().length === 0" class="p-8 text-center text-gray-500">
      No customers registered yet.
    </div>
  </div>
</div>
