<div class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Medicine Catalog</h1>
      <p class="text-sm text-gray-500">Search and filter medicines to add to cart</p>
    </div>

    <div class="flex items-center space-x-2">
      <div class="relative">
        <input
          type="text"
          [value]="searchTerm()"
          (input)="onSearch($event)"
          placeholder="Search name, generic, barcode..."
          class="block w-full md:w-80 px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        />
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex space-x-2 overflow-x-auto pb-2">
    <button
      (click)="setStatus('ALL')"
      [class.bg-blue-600]="statusFilter() === 'ALL'"
      [class.text-white]="statusFilter() === 'ALL'"
      [class.bg-white]="statusFilter() !== 'ALL'"
      class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 shadow-sm"
    >
      All
    </button>
    <button
      (click)="setStatus('IN_STOCK')"
      [class.bg-blue-600]="statusFilter() === 'IN_STOCK'"
      [class.text-white]="statusFilter() === 'IN_STOCK'"
      [class.bg-white]="statusFilter() !== 'IN_STOCK'"
      class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 shadow-sm"
    >
      In Stock
    </button>
    <button
      (click)="setStatus('OUT_OF_STOCK')"
      [class.bg-blue-600]="statusFilter() === 'OUT_OF_STOCK'"
      [class.text-white]="statusFilter() === 'OUT_OF_STOCK'"
      [class.bg-white]="statusFilter() !== 'OUT_OF_STOCK'"
      class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 shadow-sm"
    >
      Out of Stock
    </button>
    <button
      (click)="setStatus('DISCOUNT')"
      [class.bg-blue-600]="statusFilter() === 'DISCOUNT'"
      [class.text-white]="statusFilter() === 'DISCOUNT'"
      [class.bg-white]="statusFilter() !== 'DISCOUNT'"
      class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 shadow-sm"
    >
      Discount
    </button>
  </div>

  <!-- Medicine Grid -->
  <div *ngIf="isLoading()" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="!isLoading()" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div *ngFor="let medicine of medicines()" class="bg-white rounded-lg shadow overflow-hidden flex flex-col">
      <div class="p-4 flex-1">
        <div class="flex justify-between items-start">
          <h3 class="text-lg font-bold text-gray-900 leading-tight">{{ medicine.name }}</h3>
          <span *ngIf="medicine.discount_percentage > 0" class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded">
            -{{ medicine.discount_percentage }}%
          </span>
        </div>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-wider">{{ medicine.brand }}</p>
        <p class="text-sm text-gray-600 italic mt-2">{{ medicine.generic_name }}</p>
        
        <div class="mt-4 flex items-center justify-between">
          <span class="text-xl font-bold text-blue-600">${{ medicine.price }}</span>
          <span class="text-xs text-gray-500">Stock: {{ medicine.stock_quantity }}</span>
        </div>
      </div>
      
      <div class="bg-gray-50 p-3">
        <button
          (click)="addToCart(medicine)"
          [disabled]="medicine.stock_quantity <= 0"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition disabled:opacity-50"
        >
          {{ medicine.stock_quantity > 0 ? 'Add to Cart' : 'Out of Stock' }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading() && medicines().length === 0" class="text-center py-12">
    <p class="text-gray-500">No medicines found matching your criteria.</p>
  </div>
</div>
